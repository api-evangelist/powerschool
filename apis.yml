apis:
- aid: powerschool:powerschool-sis-api
  name: PowerSchool SIS REST API
  description: The PowerSchool SIS REST API provides programmatic access to student
    information system data including student demographics, enrollment records, grades,
    attendance, master scheduling, and district reporting. The API uses OAuth 2.0
    client credentials for authentication and returns data in JSON format. Endpoints
    follow the /ws/v1/ path convention and support GET, POST, PUT, and DELETE HTTP
    methods for full CRUD operations on supported resources.
