aid: powerschool
name: PowerSchool
description: PowerSchool is the leading provider of cloud-based K-12 student information
  system (SIS) software in North America, serving over 5,300 districts and 17 million
  students across 56 states and provinces. The PowerSchool REST API enables third-party
  developers and district integrators to access and manipulate student records, grades,
  attendance, enrollment, scheduling, and district-level reporting data programmatically.
  Authentication is handled via OAuth 2.0 client credentials, with client IDs and
  secrets provisioned through the PowerSchool Plugin Management Dashboard. PowerSchool
  supports 75+ certified third-party integrations and custom API partnerships aligned
  with Ed-Fi Alliance and 1EdTech interoperability standards.
